<div class="job-posting-container">
  <!-- <div class="form-header">
    <h2>Post a New Job</h2>
    <p>Fill in the details below to post a new job opening</p>
  </div> -->

  <!-- Success/Error Message -->
  <div *ngIf="message" class="message" [ngClass]="messageType">
    {{ message }}
  </div>

  <form (ngSubmit)="onSubmit()" class="job-form">
    <div class="form-row">
      <div class="form-group">
        <label for="title">Job Title *</label>
        <input 
          type="text" 
          id="title" 
          [(ngModel)]="title" 
          name="title"
          class="form-control"
          placeholder="e.g., Senior Frontend Developer"
          required
        />
      </div>

      <div class="form-group">
        <label for="companyName">Company Name *</label>
        <input 
          type="text" 
          id="companyName" 
          [(ngModel)]="companyName" 
          name="companyName"
          class="form-control"
          placeholder="Your company name"
          required
        />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="location">Location *</label>
        <input 
          type="text" 
          id="location" 
          [(ngModel)]="location" 
          name="location"
          class="form-control"
          placeholder="e.g., San Francisco, CA"
          required
        />
      </div>

      <div class="form-group">
        <label for="type">Job Type *</label>
        <select 
          id="type" 
          [(ngModel)]="type" 
          name="type"
          class="form-control"
          required
        >
          <option *ngFor="let jobType of jobTypes" [value]="jobType.value">
            {{ jobType.label }}
          </option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="salary">Salary Range *</label>
        <input 
          type="text" 
          id="salary" 
          [(ngModel)]="salary" 
          name="salary"
          class="form-control"
          placeholder="e.g., $80,000 - $120,000"
          required
        />
      </div>

      <div class="form-group">
        <label for="logo">Company Logo</label>
        <div class="logo-upload-section">
          <input 
            type="file" 
            id="logoFile" 
            (change)="onLogoFileSelect($event)"
            class="form-control"
            accept="image/*"
          />
          <div class="logo-preview" *ngIf="logoPreview">
            <img [src]="logoPreview" alt="Logo preview" />
            <button type="button" class="btn btn-sm btn-danger" (click)="removeLogo()">Remove</button>
          </div>
          <small>Upload a logo image (optional)</small>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="description">Job Description *</label>
      <textarea 
        id="description" 
        [(ngModel)]="description" 
        name="description"
        class="form-control"
        rows="4"
        placeholder="Provide a detailed description of the role and responsibilities..."
        required
      ></textarea>
    </div>

    <div class="form-group">
      <label for="requirements">Requirements *</label>
      <textarea 
        id="requirements" 
        [(ngModel)]="requirements" 
        name="requirements"
        class="form-control"
        rows="3"
        placeholder="List the key requirements separated by commas (e.g., Bachelor's degree, 3+ years experience, JavaScript proficiency)"
        required
      ></textarea>
      <small>Enter requirements separated by commas</small>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="resetForm()">Clear Form</button>
      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Post Job</span>
        <span *ngIf="isSubmitting">Posting...</span>
      </button>
    </div>
  </form>
</div>
