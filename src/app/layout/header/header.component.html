<header class="app-header">
  <div class="header-content">
    <h1 class="app-title">Job Portal</h1>
    
    <div class="user-section">
      <div class="user-profile">
        <div class="user-avatar">
          <span class="avatar-text">{{ (userName || userEmail || 'U').charAt(0).toUpperCase() }}</span>
        </div>
        <span class="user-email">{{ displayName }}</span>
      </div>
      
      <button class="logout-btn" (click)="onLogout()" title="Logout">
        <svg class="logout-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Logout
      </button>
    </div>
  </div>
</header>
