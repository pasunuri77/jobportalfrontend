<aside class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <button class="toggle-btn" (click)="toggleSidebar()" title="Toggle Sidebar">
      <svg class="toggle-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <h2 class="sidebar-title" *ngIf="!isCollapsed">Menu</h2>
  </div>

  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li class="nav-item" *ngFor="let item of menuItems">
        <button
          class="nav-link"
          [class.active]="isActive(item.path)"
          (click)="navigateTo(item.path)"
          [title]="isCollapsed ? item.label : ''"
        >
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <!-- User icon -->
            <ng-container [ngSwitch]="item.icon">
              <g *ngSwitchCase="'user'">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </g>
              <!-- Building icon -->
              <g *ngSwitchCase="'building'">
                <path d="M3 21h18"></path>
                <path d="M5 21V7l8-4v18"></path>
                <path d="M19 21V11l-6-3"></path>
                <rect x="9" y="9" width="4" height="4"></rect>
                <rect x="9" y="14" width="4" height="4"></rect>
              </g>
              <!-- Briefcase icon -->
              <g *ngSwitchCase="'briefcase'">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
              </g>
              <!-- Apply icon (paper airplane) -->
              <g *ngSwitchCase="'apply'">
                <path d="M22 2L11 13"></path>
                <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
              </g>
            </ng-container>
          </svg>
          <span class="nav-text" *ngIf="!isCollapsed">{{ item.label }}</span>
        </button>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <button class="logout-link" (click)="onLogout()" [title]="isCollapsed ? 'Logout' : ''">
      <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span class="nav-text" *ngIf="!isCollapsed">Logout</span>
    </button>
  </div>
</aside>
